name: Lighthouse CI
on:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Serve and audit
        run: |
          npm install -g @lhci/cli serve
          serve -s dist -l 4173 &
          sleep 3
          lhci collect --url=http://localhost:4173 --numberOfRuns=1
          lhci assert --preset=lighthouse:recommended \
            --assert.categories.performance.minScore=0.7 \
            --assert.categories.accessibility.minScore=0.8
